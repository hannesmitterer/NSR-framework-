name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/deploy-github-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare Pages artifact
        run: |
          rm -rf github-pages-site
          mkdir -p github-pages-site

          for file in index.html style.css .nojekyll; do
            if [ -f "$file" ]; then
              cp "$file" github-pages-site/
            fi
          done

          for file in *.py; do
            if [ -f "$file" ]; then
              cp "$file" github-pages-site/
            fi
          done
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'github-pages-site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
