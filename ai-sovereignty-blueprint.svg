  <g transform="translate(30,420)">
    <!-- STRESS TEST VALIDATION -->
    <rect class="box" x="0" y="0" width="720" height="100"/>
    <text class="icon" x="20" y="38">📈</text>
    <text class="title" x="60" y="30">STRESS TEST VALIDATION</text>
    <text class="subtitle" x="60" y="48">Peak Load 10k req/sec | Phi Nexus 99.98 % | OLF 12 ms | Golden Rule TOTAL</text>
    <text class="subtitle" x="60" y="68">Env : 32‑core CPU, 256 GB RAM, 100 Gbps net, runtime v3.7</text>
  </g>

  <!-- Arrows -->
  <path class="arrow" d="M390,80   L390,100"/>
  <path class="arrow" d="M390,160  L390,180"/>
  <path class="arrow" d="M390,240  L390,260"/>
  <path class="arrow" d="M390,320  L390,340"/>
  <path class="arrow" d="M390,400  L390,420"/>
</svg>
